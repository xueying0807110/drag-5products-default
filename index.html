<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUNVIERO Product Display Page</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #d8d8d8;
      --background: #ffffff;
      --soft: #f6f6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.01em;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 22px 14px 38px;
      display: grid;
      grid-template-columns: minmax(270px, 1.05fr) minmax(250px, 0.95fr);
      gap: 20px;
      align-items: stretch;
    }

    .image-panel {
      background: var(--soft);
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #eeeeee;
      overflow: hidden;
    }

    .product-image {
      width: 90%;
      height: 460px;
      max-width: 90%;
      max-height: 460px;
      object-fit: contain;
      display: block;
      opacity: 0;
      visibility: hidden;
    }

    .product-image.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .details {
      padding-top: 4px;
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      line-height: 1.28;
      margin: 0 0 10px;
      font-weight: 500;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
      display: flex;
      align-items: baseline;
      gap: 36px;
    }

    .subtitle-price {
      color: inherit;
      font-size: inherit;
      font-weight: inherit;
      white-space: nowrap;
    }

    .field {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .custom-select {
      position: relative;
      width: 96%;
    }

    .custom-select-trigger {
      width: 100%;
      height: 32px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 13px;
      padding: 0 42px 0 14px;
      border-radius: 0;
      outline: none;
      text-align: left;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .custom-select-trigger::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-right: 1px solid #222;
      border-bottom: 1px solid #222;
      transform: rotate(45deg);
    }

    .custom-select.has-user-choice .custom-select-trigger {
      border-color: #111;
    }

    .trigger-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trigger-price {
      color: inherit;
      font-size: inherit;
      white-space: nowrap;
      margin-left: auto;
    }

    .custom-options {
      display: none;
      position: absolute;
      top: 32px;
      left: 0;
      right: 0;
      z-index: 1000;
      margin: -1px 0 0;
      padding: 0;
      list-style: none;
      background: #fff;
      border: 1px solid #111;
      max-height: none;
      overflow-y: visible;
    }

    .custom-select.open .custom-options {
      display: block;
    }

    .custom-option {
      min-height: 34px;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
    }

    .custom-option:hover {
      background: #f4f4f4;
    }

    .option-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .option-price {
      color: var(--text);
      white-space: nowrap;
      margin-left: auto;
    }

    .no-buy-option {
      font-size: 13px;
      font-style: normal;
      text-decoration: none;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .custom-option.no-buy-option {
      min-height: 34px;
      align-items: center;
    }

    .no-buy-option .option-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trigger-name.no-buy-option {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .decision-message {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.4;
      color: #b00020;
    }

    .decision-message.is-visible {
      display: block;
    }

    .button {
      margin-top: auto;
      width: 100%;
      height: 48px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 520px) {
      .page {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 24px 16px 42px;
        align-items: start;
      }

      .image-panel {
        min-height: 420px;
      }

      .details {
        min-height: auto;
      }

      .product-image {
        width: 86%;
        height: 380px;
        max-width: 86%;
        max-height: 380px;
      }

      .button {
        margin-top: 24px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">LUNVIERO</header>

  <main class="page">
    <section class="details">
      <div class="brand">Aurelia Studio</div>
      <h1>Nilestone Mouse Pad</h1>
      <div class="subtitle">
        <span>Premium-Textured Mouse Pad</span>
        <span class="subtitle-price">$6.5</span>
      </div>

      <div class="field">
        <label id="productLabel">Product</label>
        <div class="custom-select" id="productSelect" aria-labelledby="productLabel">
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
          <ul class="custom-options" role="listbox"></ul>
        </div>
      </div>

      <div class="decision-message" id="decisionMessage">Please select one option to continue.</div>

      <button class="button" type="button">Continue</button>
    </section>

    <section class="image-panel" aria-label="Product image area">
      <img id="productImage" class="product-image" src="" alt="" decoding="async" loading="eager" />
    </section>
  </main>

  <script src="products.js"></script>
  <script>
    const productSelect = document.getElementById('productSelect');
    const trigger = productSelect.querySelector('.custom-select-trigger');
    const optionList = productSelect.querySelector('.custom-options');
    const productImage = document.getElementById('productImage');
    const continueButton = document.querySelector('.button');
    const decisionMessage = document.getElementById('decisionMessage');

    const PRODUCT_LIMIT = 5;
    const preloadedImages = [];

    function getAvailableProducts() {
      if (!Array.isArray(window.PRODUCTS)) return [];

      return window.PRODUCTS
        .filter(product => product && product.name && product.image)
        .slice(0, PRODUCT_LIMIT);
    }

    function preloadProductImages() {
      const imageSources = getAvailableProducts()
        .map(product => product.image)
        .filter(Boolean);

      [...new Set(imageSources)].forEach((src) => {
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'eager';
        img.src = src;
        preloadedImages.push(img);
      });
    }

    let initialDefaultProduct = '';
    let initialDefaultProductImage = '';
    let initialDefaultProductPrice = '';
    let productOptionOrder = '';
    let selectedProductName = '';
    let selectedProductImage = '';
    let selectedProductPrice = '';

    const QUALTRICS_PAGE_ID = 'lunviero_dropdown_default_option';

    let totalClicks = 0;
    let optionClicks = 0;
    let continueClicks = 0;
    let invalidContinueClicks = 0;

    function countOptionClick() {
      optionClicks += 1;
      totalClicks += 1;
    }

    function countContinueClick() {
      continueClicks += 1;
      totalClicks += 1;
    }

    function countInvalidContinueClick() {
      invalidContinueClicks += 1;
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function setTriggerToProduct(product) {
      trigger.innerHTML = '';

      const selectedName = document.createElement('span');
      selectedName.className = 'trigger-name';
      selectedName.textContent = product.name;
      trigger.appendChild(selectedName);

      selectedProductName = product.name;
      selectedProductImage = product.image;
      selectedProductPrice = '';

      productImage.src = product.image;
      productImage.alt = product.name;
      productImage.classList.add('is-visible');
      decisionMessage.classList.remove('is-visible');
    }

    function buildProductOptions() {
      const availableProducts = getAvailableProducts();

      if (availableProducts.length === 0) {
        console.error('products.js was not loaded correctly, or no valid products were found.');
        return;
      }

      const randomizedProducts = shuffleArray(availableProducts);
      const defaultProduct = randomizedProducts[Math.floor(Math.random() * randomizedProducts.length)];
      const displayedProducts = [
        defaultProduct,
        ...randomizedProducts.filter(product => product !== defaultProduct)
      ];

      initialDefaultProduct = defaultProduct.name;
      initialDefaultProductImage = defaultProduct.image || '';
      initialDefaultProductPrice = '';
      productOptionOrder = displayedProducts.map(product => product.name).join('|');

      optionList.innerHTML = '';

      displayedProducts.forEach((product) => {
        const option = document.createElement('li');
        option.className = 'custom-option';
        option.setAttribute('role', 'option');
        option.dataset.name = product.name;
        option.dataset.image = product.image;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'option-name';
        nameSpan.textContent = product.name;

        option.appendChild(nameSpan);
        optionList.appendChild(option);
      });

      setTriggerToProduct(defaultProduct);
      productSelect.classList.add('has-user-choice');
    }

    trigger.addEventListener('click', () => {
      const isOpen = productSelect.classList.toggle('open');
      trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    optionList.addEventListener('click', (event) => {
      const option = event.target.closest('.custom-option');
      if (!option) return;

      countOptionClick();
      productSelect.classList.add('has-user-choice');

      setTriggerToProduct({
        name: option.dataset.name,
        image: option.dataset.image
      });

      productSelect.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    });

    document.addEventListener('click', (event) => {
      if (!productSelect.contains(event.target)) {
        productSelect.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      }
    });

    continueButton.addEventListener('click', () => {
      countContinueClick();

      if (!selectedProductName) {
        countInvalidContinueClick();
        decisionMessage.classList.add('is-visible');
        return;
      }

      window.parent.postMessage({
        type: 'netlify_complete',

        choice: selectedProductName,
        page: QUALTRICS_PAGE_ID,
        totalClicks: String(totalClicks),
        optionClicks: String(optionClicks),
        continueClicks: String(continueClicks),
        invalidContinueClicks: String(invalidContinueClicks),

        // Initial option shown by default when the page first loads.
        // Qualtrics will only save this if the Qualtrics-side JavaScript also stores it.
        defaultOption: initialDefaultProduct,
        initialDefaultOption: initialDefaultProduct,
        initialDefaultProduct: initialDefaultProduct,
        initialDefaultProductImage: initialDefaultProductImage,
        initialDefaultProductPrice: initialDefaultProductPrice,

        finalSelectedProduct: selectedProductName,
        selectedProduct: selectedProductName,
        selectedPrice: selectedProductPrice,
        selectedProductImage: selectedProductImage,
        productChosen: '1',
        noBuyOptionChosen: '0',
        selectionChanged: selectedProductName === initialDefaultProduct ? '0' : '1',
        productOptionOrder: productOptionOrder
      }, '*');
    });

    preloadProductImages();
    buildProductOptions();
  </script>
</body>
</html>
